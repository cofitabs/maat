<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maat ja pääkaupungit</title>

    <!-- Bootswatch-nimisen Bootstrap-templaten Sandstone-teema -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/sandstone/bootstrap.min.css">     
    
    <!-- DataTablesin Bootstrap 5 -integraation CSS -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <!-- DataTablesin responsive-lisäosan CSS -->
    <link href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="mb-4">Maailman maat</h2>
        
        <div class="card shadow-sm">
            <div class="card-body">
                
                <table id="maatTable" class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>Maa</th>
                            <th>Lippu</th>
                            <th>Väkiluku</th>
                            <th>Pääkaupunki</th>
                            <th>Maanosa(t)</th>
                        </tr>
                    </thead>
                    <tbody id="sisalto">
                        <!-- Haettu data tulee tähän -->
                    </tbody>
                </table>

            </div>
        </div>
    </div>

    <!-- Tuodaan JQuery, koska DataTables käyttää sitä -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    <!-- Teemassa käytettävät Bootstrapin Javascript-komponentit -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- DataTables -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <!-- DataTablesin lisäosa, joka tekee tyylistä yhteensopivan Bootstrap 5:n kanssa -->
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <!-- DataTablesin responsive-lisäosa -->
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

    <script>
    function tulostaTaulukko(data) {
        let tiedot = "";

        // Liitetään API:sta tullut data merkkijonoon
        for (let i = 0; i < data.length; i++) {
            tiedot += "<tr>" +
                            `<td>${data[i].name.common}</td>`+
                            `<td>${data[i].flag}</td>`+
                            `<td>${data[i].population}</td>`+
                            `<td>${data[i].capital}</td>`+
                            "<td>";
                            // Jos maa kuuluu useampaan kuin yhteen maanosaan, listataan kaikki
                            for (let j = 0; j < data[i].continents.length; j++) {
                                tiedot += `${data[i].continents[j]} `;
                            }
            tiedot += "</td>" +
                    "</tr>";
        }

        // Lisätään rivit HTML-taulukkoon
        document.getElementById("sisalto").innerHTML = tiedot;         

        // Alustetaan DataTables viimeiseksi, jotta tiedot ehtivät tulla fetchillä
        $('#maatTable').DataTable({
            responsive: true
        });
    }

    // Haetaan maadata
    fetch('https://restcountries.com/v3.1/all?fields=name,flag,population,capital,continents')
        .then(response => {
            if (!response.ok) {
                throw new Error('Verkkovirhe');
            }
            return response.json(); 
        })
        .then(data => {
            tulostaTaulukko(data);
        })
        .catch(error => console.error('Virhe:', error));
    </script>
        
</body>
</html>
